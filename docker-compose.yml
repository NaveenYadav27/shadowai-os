version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: shadowai-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-shadowai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shadowai_password}
      POSTGRES_DB: ${POSTGRES_DB:-shadowai_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-shadowai}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shadowai-network

  # Redis Cache & Message Broker
  redis:
    image: redis:7-alpine
    container_name: shadowai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shadowai-network

  # Elasticsearch for Search & Logging
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.0
    container_name: shadowai-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - shadowai-network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shadowai-backend
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql://shadowai:shadowai_password@postgres:5432/shadowai_db
      - REDIS_URL=redis://redis:6379/0
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - OLLAMA_BASE_URL=http://ollama:11434
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - shadowai-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Celery Worker
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shadowai-celery-worker
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql://shadowai:shadowai_password@postgres:5432/shadowai_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      - postgres
      - redis
    networks:
      - shadowai-network
    command: celery -A app.workers.celery_app worker --loglevel=info

  # Celery Beat Scheduler
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shadowai-celery-beat
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql://shadowai:shadowai_password@postgres:5432/shadowai_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      - postgres
      - redis
    networks:
      - shadowai-network
    command: celery -A app.workers.celery_app beat --loglevel=info

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: shadowai-frontend
    environment:
      - REACT_APP_API_URL=http://localhost:8000
      - REACT_APP_WS_URL=ws://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - shadowai-network
    command: npm start

  # Ollama (Local LLM)
  ollama:
    image: ollama/ollama:latest
    container_name: shadowai-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - shadowai-network

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:
  ollama_data:

networks:
  shadowai-network:
    driver: bridge
